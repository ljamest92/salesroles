<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0F172A"/>

  <!-- Subtle grid lines for depth -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Emerald glow blob -->
  <ellipse cx="1100" cy="500" rx="300" ry="200" fill="#10B981" fill-opacity="0.06"/>

  <!-- SR monogram — top right -->
  <rect x="1058" y="48" width="96" height="96" rx="18" fill="#10B981"/>
  <text x="1106" y="96" dominant-baseline="central" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="900" font-size="44" fill="#0F172A">SR</text>

  <!-- Main headline -->
  <text x="80" y="256" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="900" font-size="88" fill="#FFFFFF" letter-spacing="-2">SalesRoles.co</text>

  <!-- Tagline -->
  <text x="80" y="362" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="600" font-size="36" fill="#10B981">Full transparency. Every role. Every time.</text>

  <!-- Divider -->
  <rect x="80" y="408" width="120" height="4" rx="2" fill="#10B981" fill-opacity="0.5"/>

  <!-- Sub-label -->
  <text x="80" y="460" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="600" font-size="22" fill="#ffffff" fill-opacity="0.4" letter-spacing="3">THE ONLY SALES JOB BOARD WITH MANDATORY COMP TRANSPARENCY</text>
</svg>
